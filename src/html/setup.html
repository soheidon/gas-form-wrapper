<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>初期設定</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <?!= HtmlService.createHtmlOutputFromFile('html/styles.css').getContent(); ?>
</head>
<body>
  <div class="container setup-page">
    <div class="setup-lang-bar" role="group" aria-labelledby="setup-lang-label">
      <span id="setup-lang-label" class="setup-lang-bar-label" data-i18n="langGroupLabel">表示言語</span>
      <div class="setup-lang-switch">
        <button type="button" id="lang-ja" class="setup-lang-btn" aria-pressed="true" data-lang="ja">日本語</button>
        <button type="button" id="lang-en" class="setup-lang-btn" aria-pressed="false" data-lang="en">English</button>
      </div>
    </div>

    <section class="setup-prep" aria-labelledby="prep-heading">
      <h2 id="prep-heading" class="setup-subheading setup-subheading--lead" data-i18n="prepHeading"></h2>
      <div class="setup-prose-block">
        <p class="setup-prose">
          <span class="setup-prose-label" data-i18n="prepFormLabel"></span>
          <span data-i18n="prepFormText"></span>
        </p>
        <p class="setup-prose">
          <span class="setup-prose-label" data-i18n="prepSheetLabel"></span>
          <span data-i18n="prepSheetText"></span>
        </p>
      </div>
    </section>

    <header class="setup-header">
      <h1 class="setup-title" data-i18n="pageTitle"></h1>
      <p class="setup-lead" data-i18n="pageLead"></p>
    </header>

    <section class="setup-section" aria-labelledby="section-inputs-heading">
      <h2 id="section-inputs-heading" class="visually-hidden" data-i18n="sectionInputsSr"></h2>

      <div class="setup-field-block">
        <label class="setup-label" for="setup-form-id">
          <span data-i18n="labelFormUrl"></span><span class="required-mark" data-i18n="required" aria-hidden="true"></span>
        </label>
        <input
          type="url"
          inputmode="url"
          id="setup-form-id"
          name="formId"
          class="setup-input"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          data-i18n-placeholder="placeholderUrl"
          placeholder=""
          aria-describedby="hint-form-id"
        />
        <p id="hint-form-id" class="setup-hint" data-i18n="hintForm"></p>
      </div>

      <div class="setup-field-block">
        <label class="setup-label" for="setup-sheet-id">
          <span data-i18n="labelSheetUrl"></span><span class="required-mark" data-i18n="required" aria-hidden="true"></span>
        </label>
        <input
          type="url"
          inputmode="url"
          id="setup-sheet-id"
          name="oplogSheetId"
          class="setup-input"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          data-i18n-placeholder="placeholderUrl"
          placeholder=""
          aria-describedby="hint-sheet-id"
        />
        <p id="hint-sheet-id" class="setup-hint" data-i18n="hintSheet"></p>
      </div>

      <div class="setup-actions">
        <button type="button" id="btn-save" class="btn-setup-primary" data-i18n="btnSave"></button>
      </div>
    </section>

    <div id="feedback-area" class="setup-feedback" role="region" aria-live="polite" aria-atomic="true"></div>

    <section
      id="url-section"
      class="setup-section setup-url-section"
      hidden
      aria-labelledby="url-section-heading"
    >
      <h2 id="url-section-heading" class="setup-subheading" data-i18n="urlSectionHeading"></h2>
      <p class="setup-hint setup-hint--tight" data-i18n="urlSectionHint"></p>
      <div class="setup-url-row">
        <input
          type="text"
          id="setup-wrapper-url"
          class="setup-input setup-input-readonly"
          readonly
          data-i18n-aria-label="ariaRespondentUrl"
          aria-label=""
        />
        <button type="button" id="btn-copy-url" class="btn-setup-secondary" data-i18n="btnCopy"></button>
      </div>
      <p id="copy-status" class="setup-copy-status" role="status" aria-live="polite"></p>

      <h3 id="qr-section-heading" class="setup-subheading setup-subheading--nest" data-i18n="qrSectionHeading"></h3>
      <p class="setup-hint setup-hint--tight" data-i18n="qrSectionHint"></p>
      <p class="setup-hint setup-hint--tight" data-i18n="qrTechHint"></p>
      <div class="setup-qr-actions">
        <button type="button" id="btn-qr-generate" class="btn-setup-secondary" data-i18n="btnQrGenerate"></button>
      </div>
      <p id="qr-status" class="setup-copy-status setup-copy-status--error" role="status" aria-live="polite"></p>
      <div id="qr-wrap" class="setup-qr-wrap" hidden>
        <div id="qr-host" class="setup-qr-host"></div>
        <p class="setup-hint setup-hint--tight" data-i18n="qrDownloadHint"></p>
      </div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <?!= HtmlService.createHtmlOutputFromFile('html/setup.js').getContent(); ?>
</body>
</html>
