<script>
(function () {
  var LANG_STORAGE_KEY = 'gas_setup_ui_lang';

  var STRINGS = {
    ja: {
      docTitle: '初期設定',
      langGroupLabel: '表示言語',
      prepHeading: '初期設定の前に準備しておくもの',
      prepFormLabel: 'Googleフォーム',
      prepFormText: '質問項目や回答形式を含めて、あらかじめ完成させておいてください。',
      prepSheetLabel: '回答を確認するための Google スプレッドシート',
      prepSheetText: '回答内容やログを確認するために使います。事前に作成しておいてください。',
      pageTitle: '初期設定',
      pageLead: 'フォームとスプレッドシートのURLを貼り付けて保存すると、回答者に送る用のURLが表示されます。',
      sectionInputsSr: '入力',
      labelFormUrl: 'GoogleフォームのURL',
      required: '（必須）',
      placeholderUrl: 'https:// で始まるURLをそのまま貼り付け',
      hintForm: '使いたいGoogleフォームを開き、そのURLをそのまま貼り付けてください。',
      labelSheetUrl: 'GoogleスプレッドシートのURL',
      hintSheet: '回答の確認に使うGoogleスプレッドシートを開き、そのURLをそのまま貼り付けてください。',
      btnSave: '設定を保存する',
      btnSaveBusy: '保存しています...',
      urlSectionHeading: '回答用のURL',
      urlSectionHint: 'このURLを回答者に送ってください。この画面のアドレス（初期設定）ではありません。',
      ariaRespondentUrl: '回答用のURL',
      btnCopy: 'URLをコピー',
      saveSuccessShort: '設定を保存しました。',
      errSaveFailedGeneric: '設定を保存できませんでした。',
      errRequiredFields: '必須の入力が足りません。',
      errRequiredHint: '両方の欄に入力してから、「設定を保存する」を押してください。',
      errSaveNetwork: '保存中に問題が発生しました。',
      errSaveNetworkHint: '通信状態を確認して、もう一度お試しください。',
      copyNoUrl: 'コピーできるURLがありません。いま開いている画面のURLから「?」以降を削除して使うこともできます。',
      copyOk: 'コピーしました。回答者に貼り付けて送ってください。',
      copyFail: 'コピーできませんでした。URLを長押し（または右クリック）して選択し、コピーしてください。',
      qrSectionHeading: 'QRコード',
      qrSectionHint: '上に表示されている回答用URL（短縮していないURL）のQRコードを表示します。',
      qrTechHint: 'QRコードはこのブラウザ内だけで描画されます。外部サービスにURLを送りません。',
      btnQrGenerate: 'QRコードを表示',
      qrNoLongUrl: '回答用のURLが表示されていません。',
      qrGenerateFailed: 'QRコードの生成に失敗しました。',
      qrDownloadHint: '画像を長押し（または右クリック）して保存できます。',
      qrLibMissing: 'QRコード用のライブラリを読み込めませんでした。ページを再読み込みしてください。',
      authErrTitle: 'アクセス権限がありません',
      authErrBody: '管理者としてログインし直してから、もう一度この画面を開いてください。'
    },
    en: {
      docTitle: 'Initial setup',
      langGroupLabel: 'Language',
      prepHeading: 'Before you start',
      prepFormLabel: 'Google Form',
      prepFormText: 'Finish creating your form first, including all questions and how answers are collected.',
      prepSheetLabel: 'Google Sheet for reviewing responses',
      prepSheetText: 'Used to review responses and logs. Create this sheet beforehand.',
      pageTitle: 'Initial setup',
      pageLead: 'Paste your form and spreadsheet URLs and save. You will then see the URL to share with respondents.',
      sectionInputsSr: 'Input',
      labelFormUrl: 'Google Form URL',
      required: '(required)',
      placeholderUrl: 'Paste the full URL starting with https://',
      hintForm: 'Open the form you want to use and paste the URL from the address bar.',
      labelSheetUrl: 'Google Sheet URL',
      hintSheet: 'Open the sheet you use to review responses and paste its URL from the address bar.',
      btnSave: 'Save settings',
      btnSaveBusy: 'Saving…',
      urlSectionHeading: 'URL for respondents',
      urlSectionHint: 'Share this URL with respondents. It is not the same as this setup page’s address.',
      ariaRespondentUrl: 'URL for respondents',
      btnCopy: 'Copy URL',
      saveSuccessShort: 'Settings saved.',
      errSaveFailedGeneric: 'Could not save settings.',
      errRequiredFields: 'Please fill in both fields.',
      errRequiredHint: 'Enter both URLs, then tap Save settings.',
      errSaveNetwork: 'Something went wrong while saving.',
      errSaveNetworkHint: 'Check your connection and try again.',
      copyNoUrl: 'No URL to copy. You can copy this page’s address and remove everything from ? onward.',
      copyOk: 'Copied. Share it with your respondents.',
      copyFail: 'Could not copy. Long-press or right-click the URL to select and copy.',
      qrSectionHeading: 'QR code',
      qrSectionHint: 'Generates a QR code for the respondent URL shown above (the full URL, not shortened).',
      qrTechHint: 'The QR code is generated only in this browser. The URL is not sent to an external service.',
      btnQrGenerate: 'Show QR code',
      qrNoLongUrl: 'The respondent URL is not available yet.',
      qrGenerateFailed: 'Could not generate the QR code.',
      qrDownloadHint: 'Long-press or right-click the image to save it.',
      qrLibMissing: 'Could not load the QR code library. Reload the page and try again.',
      authErrTitle: 'Access denied',
      authErrBody: 'Sign in again as an authorized administrator, then open this page again.'
    }
  };

  function byId(id) {
    return document.getElementById(id);
  }

  function getLang() {
    try {
      var s = localStorage.getItem(LANG_STORAGE_KEY);
      if (s === 'en' || s === 'ja') return s;
    } catch (e) {}
    return 'ja';
  }

  function setLang(lang) {
    if (lang !== 'en' && lang !== 'ja') return;
    try {
      localStorage.setItem(LANG_STORAGE_KEY, lang);
    } catch (e) {}
    applyStaticI18n();
    var btn = byId('btn-save');
    if (btn && !btn.disabled) {
      btn.textContent = t('btnSave');
    }
  }

  function t(key) {
    var lang = getLang();
    var pack = STRINGS[lang] || STRINGS.ja;
    return Object.prototype.hasOwnProperty.call(pack, key) ? pack[key] : (STRINGS.ja[key] || '');
  }

  function applyStaticI18n() {
    var lang = getLang();
    document.documentElement.lang = lang === 'en' ? 'en' : 'ja';
    var root = document.querySelector('.setup-page');
    if (root) {
      root.classList.toggle('setup-page--en', lang === 'en');
    }
    document.title = t('docTitle');

    var list = document.querySelectorAll('[data-i18n]');
    for (var i = 0; i < list.length; i++) {
      var el = list[i];
      var key = el.getAttribute('data-i18n');
      if (key) el.textContent = t(key);
    }

    var ph = document.querySelectorAll('[data-i18n-placeholder]');
    for (var j = 0; j < ph.length; j++) {
      var inp = ph[j];
      var pk = inp.getAttribute('data-i18n-placeholder');
      if (pk) inp.placeholder = t(pk);
    }

    var ar = document.querySelectorAll('[data-i18n-aria-label]');
    for (var k = 0; k < ar.length; k++) {
      var inp2 = ar[k];
      var ak = inp2.getAttribute('data-i18n-aria-label');
      if (ak) inp2.setAttribute('aria-label', t(ak));
    }

    var jaBtn = byId('lang-ja');
    var enBtn = byId('lang-en');
    if (jaBtn) jaBtn.setAttribute('aria-pressed', lang === 'ja' ? 'true' : 'false');
    if (enBtn) enBtn.setAttribute('aria-pressed', lang === 'en' ? 'true' : 'false');
  }

  function clearNode(el) {
    while (el.firstChild) el.removeChild(el.firstChild);
  }

  function renderFeedback(kind, mainText, subText) {
    var area = byId('feedback-area');
    if (!area) return;
    clearNode(area);
    var box = document.createElement('div');
    box.className =
      kind === 'success' ? 'msg-setup msg-setup--success' : 'msg-setup msg-setup--error';
    box.setAttribute('role', kind === 'error' ? 'alert' : 'status');

    var p1 = document.createElement('p');
    p1.className = 'msg-setup__main';
    p1.textContent = mainText || '';
    box.appendChild(p1);

    if (subText) {
      var p2 = document.createElement('p');
      p2.className = 'msg-setup__sub';
      p2.textContent = subText;
      box.appendChild(p2);
    }

    area.appendChild(box);
  }

  function clearFeedback() {
    var area = byId('feedback-area');
    if (!area) return;
    clearNode(area);
  }

  function setUrlSectionVisible(visible) {
    var sec = byId('url-section');
    if (!sec) return;
    if (visible) {
      sec.removeAttribute('hidden');
    } else {
      sec.setAttribute('hidden', 'hidden');
    }
  }

  function setWrapperUrl(url) {
    var input = byId('setup-wrapper-url');
    if (!input) return;
    input.value = url || '';
  }

  function clearQrPreview() {
    var host = byId('qr-host');
    var wrap = byId('qr-wrap');
    var qs = byId('qr-status');
    if (host) host.innerHTML = '';
    if (wrap) wrap.setAttribute('hidden', 'hidden');
    if (qs) qs.textContent = '';
  }

  function onQrGenerate() {
    var status = byId('qr-status');
    var wrap = byId('qr-wrap');
    var host = byId('qr-host');
    if (status) status.textContent = '';
    if (typeof QRCode === 'undefined') {
      if (status) status.textContent = t('qrLibMissing');
      return;
    }
    var lInp = byId('setup-wrapper-url');
    var url = lInp ? String(lInp.value || '').trim() : '';
    if (!url) {
      if (status) status.textContent = t('qrNoLongUrl');
      return;
    }
    if (!host) return;
    try {
      host.innerHTML = '';
      var opts = {
        text: url,
        width: 220,
        height: 220,
        colorDark: '#202124',
        colorLight: '#ffffff'
      };
      if (QRCode.CorrectLevel) {
        opts.correctLevel = QRCode.CorrectLevel.M;
      }
      new QRCode(host, opts);
      if (wrap) wrap.removeAttribute('hidden');
    } catch (eGen) {
      if (wrap) wrap.setAttribute('hidden', 'hidden');
      host.innerHTML = '';
      if (status) status.textContent = t('qrGenerateFailed');
    }
  }

  function setBusy(isBusy) {
    var btn = byId('btn-save');
    if (!btn) return;
    btn.disabled = !!isBusy;
    btn.setAttribute('aria-busy', isBusy ? 'true' : 'false');
    btn.textContent = isBusy ? t('btnSaveBusy') : t('btnSave');
  }

  function handleAuthError() {
    var title = t('authErrTitle');
    var body = t('authErrBody');
    document.body.innerHTML =
      '<div class="container setup-page">'
      + '<div class="msg-setup msg-setup--error" role="alert">'
      + '<p class="msg-setup__main">' + escapeHtml_(title) + '</p>'
      + '<p class="msg-setup__sub">' + escapeHtml_(body) + '</p>'
      + '</div></div>';
  }

  function escapeHtml_(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function isAdminAuthFailure(err) {
    var msg = (err && err.message) ? String(err.message) : '';
    return msg.indexOf('ADMIN_AUTH_FAILED') !== -1;
  }

  function loadSettings() {
    google.script.run
      .withSuccessHandler(function (data) {
        if (!data) return;
        if (data.formId) byId('setup-form-id').value = data.formId;
        if (data.oplogSheetId) byId('setup-sheet-id').value = data.oplogSheetId;
      })
      .withFailureHandler(function (err) {
        if (isAdminAuthFailure(err)) {
          handleAuthError();
        }
      })
      .getSettings();
  }

  function tryFillWrapperUrlFallback() {
    google.script.run
      .withSuccessHandler(function (res) {
        if (res && res.success && res.wrapperUrl) {
          setWrapperUrl(res.wrapperUrl);
        }
      })
      .withFailureHandler(function () {})
      .buildWrapperUrl(getLang());
  }

  function applySaveResult(result) {
    if (!result || !result.success) {
      var sub = (result && result.recovery) ? result.recovery : '';
      renderFeedback(
        'error',
        (result && result.message) ? result.message : t('errSaveFailedGeneric'),
        sub
      );
      setUrlSectionVisible(false);
      setWrapperUrl('');
      clearQrPreview();
      return;
    }

    clearFeedback();
    var extra = '';
    if (result.urlRecovery) {
      extra = result.urlRecovery;
    }
    renderFeedback('success', result.message || t('saveSuccessShort'), extra);
    if (result.nextSteps) {
      var area = byId('feedback-area');
      if (area && area.lastChild) {
        var p3 = document.createElement('p');
        p3.className = 'msg-setup__sub msg-setup__sub--next';
        p3.textContent = result.nextSteps;
        area.lastChild.appendChild(p3);
      }
    }

    clearQrPreview();
    if (result.wrapperUrl) {
      setWrapperUrl(result.wrapperUrl);
      setUrlSectionVisible(true);
    } else {
      setUrlSectionVisible(true);
      setWrapperUrl('');
      tryFillWrapperUrlFallback();
    }
  }

  function onSave() {
    if (byId('btn-save').disabled) return;

    clearFeedback();
    setUrlSectionVisible(false);
    setWrapperUrl('');
    byId('copy-status').textContent = '';
    clearQrPreview();

    var formId = byId('setup-form-id').value;
    var sheetId = byId('setup-sheet-id').value;

    if (!String(formId).trim() || !String(sheetId).trim()) {
      renderFeedback(
        'error',
        t('errRequiredFields'),
        t('errRequiredHint')
      );
      return;
    }

    setBusy(true);
    google.script.run
      .withSuccessHandler(function (res) {
        setBusy(false);
        applySaveResult(res);
      })
      .withFailureHandler(function (err) {
        setBusy(false);
        if (isAdminAuthFailure(err)) {
          handleAuthError();
          return;
        }
        renderFeedback(
          'error',
          t('errSaveNetwork'),
          t('errSaveNetworkHint')
        );
      })
      .saveSettings({
        formId: formId,
        oplogSheetId: sheetId,
        uiLang: getLang()
      });
  }

  function onCopy() {
    var input = byId('setup-wrapper-url');
    var status = byId('copy-status');
    if (!input || !status) return;

    var text = String(input.value || '').trim();
    if (!text) {
      status.textContent = t('copyNoUrl');
      return;
    }

    function done(ok) {
      status.textContent = ok ? t('copyOk') : t('copyFail');
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () {
        done(true);
      }).catch(function () {
        legacyCopy(text, done);
      });
    } else {
      legacyCopy(text, done);
    }
  }

  function legacyCopy(text, cb) {
    try {
      var inputEl = byId('setup-wrapper-url');
      inputEl.focus();
      inputEl.select();
      var ok = document.execCommand && document.execCommand('copy');
      cb(!!ok);
    } catch (e) {
      cb(false);
    }
  }

  document.addEventListener('DOMContentLoaded', function () {
    applyStaticI18n();

    byId('lang-ja').addEventListener('click', function () {
      setLang('ja');
    });
    byId('lang-en').addEventListener('click', function () {
      setLang('en');
    });

    byId('btn-save').addEventListener('click', onSave);
    byId('btn-copy-url').addEventListener('click', onCopy);
    var bQr = byId('btn-qr-generate');
    if (bQr) bQr.addEventListener('click', onQrGenerate);
    loadSettings();
  });
})();
</script>
